<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Dziękuję — Chłop Jak Dąb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151827 0, #05060a 55%);
      color: #f5f5f5;
      text-align: center;
      padding: 60px 20px;
      line-height: 1.6;
    }
    .card {
      max-width: 480px;
      margin: 0 auto;
      background: rgba(10,12,20,0.95);
      border: 1px solid #262938;
      border-radius: 14px;
      padding: 32px 24px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #e0b15a;
    }
    p {
      font-size: 15px;
      color: #a0a4b3;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      background: #e0b15a;
      color: #111;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s;
    }
    a:hover {
      background: #f0c26c;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Dziękuję za Twoją aplikację</h1>
    <p>
      Otrzymałem Twoje zgłoszenie.  
      Jeśli uznam, że mogę realnie Ci pomóc — odezwę się mailowo.
    </p>
    <a href="https://chlopjakdab.com">Wróć na stronę główną</a>
  </div>

</body>
</html>
