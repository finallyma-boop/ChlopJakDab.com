    /* (zostawiłem cały CSS, bo był poprawny) */
    :root {
      --bg: #05060a;
      --card: #0f1118;
      --accent: #e0b15a;
      --accent-soft: rgba(224,177,90,0.12);
      --text: #f5f5f5;
      --muted: #a0a4b3;
      --danger: #ff6b6b;
      --border: #262938;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151827 0, #05060a 55%);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .logo {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 14px;
      color: var(--accent);
    }
    .tagline {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 32px;
      align-items: center;
      margin-bottom: 40px;
    }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; }
    }
    .hero-eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .hero-title {
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(10,12,20,0.8);
      color: var(--muted);
    }
